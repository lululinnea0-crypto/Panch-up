<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panch Upp | Administración</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="styles.css">

</head>

<body class="bg-black text-white">

<div class="flex min-h-screen">

    <!-- Menú lateral -->
    <aside class="w-64 bg-zinc-900 border-r border-zinc-800 p-5">

        <h1 class="text-2xl font-bold text-cyan-400 mb-8">
            🔒 Panch Upp
        </h1>

        <button class="w-full text-left p-3 rounded-lg hover:bg-zinc-800 mb-2">
            🏠 Inicio
        </button>

        <button class="w-full text-left p-3 rounded-lg hover:bg-zinc-800 mb-2">
            💰 Precios
        </button>

        <button class="w-full text-left p-3 rounded-lg hover:bg-zinc-800 mb-2">
            🌭 Productos
        </button>

        <button class="w-full text-left p-3 rounded-lg hover:bg-zinc-800 mb-2">
            📊 Estadísticas
        </button>

        <button class="w-full text-left p-3 rounded-lg hover:bg-zinc-800">
            🚪 Salir
        </button>

    </aside>

    <!-- Contenido -->
    <main class="flex-1 p-8">

    <h2 class="text-3xl font-bold text-cyan-400 mb-6">
        💰 Gestión de Precios
    </h2>

    <div class="space-y-4 max-w-lg">

        <div class="flex justify-between items-center">
            <span>🌭 Pancho Clásico</span>
            <input id="precio-clasico" type="number" value="3000"
                class="bg-zinc-800 border border-zinc-700 rounded px-3 py-2 w-28 text-right">
        </div>

        <div class="flex justify-between items-center">
            <span>🧀 Super Pancho</span>
            <input id="precio-super" type="number" value="5500"
                class="bg-zinc-800 border border-zinc-700 rounded px-3 py-2 w-28 text-right">
        </div>

        <div class="flex justify-between items-center">
            <span>🇺🇸 Pancho Americano</span>
            <input id="precio-americano" type="number" value="5000"
                class="bg-zinc-800 border border-zinc-700 rounded px-3 py-2 w-28 text-right">
        </div>

        <button onclick="guardarPrecios()"
            class="mt-6 bg-cyan-500 hover:bg-cyan-400 text-black font-bold px-6 py-3 rounded-xl transition">
            💾 Guardar cambios
        </button>

    </div>

</main>

</div>
    <script>
function guardarPrecios() {

    const precios = {
        clasico: document.getElementById("precio-clasico").value,
        super: document.getElementById("precio-super").value,
        americano: document.getElementById("precio-americano").value
    };

    localStorage.setItem("preciosPanchUpp", JSON.stringify(precios));

    alert("✅ Precios guardados correctamente");
}
        function cargarPrecios() {

    const precios = JSON.parse(localStorage.getItem("preciosPanchUpp"));

    if (!precios) return;

    document.getElementById("precio-clasico").value = precios.clasico;
    document.getElementById("precio-super").value = precios.super;
    document.getElementById("precio-americano").value = precios.americano;

        }

        cargarPrecios();

 </script>
    
</body>
</html>
